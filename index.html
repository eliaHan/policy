<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX Writing 가이드 — WILLOG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --sidebar-active: #1e40af;
      --sidebar-text: #94a3b8;
      --sidebar-text-muted: #475569;
      --sidebar-heading: #64748b;
      --sidebar-width: 260px;
      --topbar-height: 60px;

      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #1d4ed8;
      --accent-light: #eff6ff;

      --badge-error-bg: #fef2f2;
      --badge-error-text: #dc2626;
      --badge-error-border: #fecaca;
      --badge-success-bg: #f0fdf4;
      --badge-success-text: #16a34a;
      --badge-success-border: #bbf7d0;
      --badge-info-bg: #eff6ff;
      --badge-info-text: #2563eb;
      --badge-info-border: #bfdbfe;
      --badge-loading-bg: #f8fafc;
      --badge-loading-text: #475569;
      --badge-loading-border: #cbd5e1;
      --badge-empty-bg: #fffbeb;
      --badge-empty-text: #d97706;
      --badge-empty-border: #fde68a;

      --feedback-toast: #7c3aed;
      --feedback-modal: #0369a1;
      --feedback-empty: #059669;
      --feedback-input: #dc2626;
      --feedback-dialog: #c026d3;
      --feedback-bottom: #0891b2;
      --feedback-default: #64748b;
    }

    html { font-size: 14px; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #1e293b;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }

    .sidebar-logo .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }

    .sidebar-logo h1 {
      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.2px;
    }

    .sidebar-logo .subtitle {
      font-size: 10px;
      color: var(--sidebar-text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .nav-group {
      margin-bottom: 4px;
    }

    .nav-group-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--sidebar-heading);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 10px 20px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      cursor: pointer;
      transition: all 0.15s ease;
      border-radius: 0;
      color: var(--sidebar-text);
      font-size: 13px;
      font-weight: 400;
      user-select: none;
      position: relative;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: #e2e8f0;
    }

    .nav-item.active {
      background: var(--sidebar-active);
      color: #ffffff;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 3px;
      background: #93c5fd;
      border-radius: 0 2px 2px 0;
    }

    .nav-item .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .nav-item.active .nav-dot { background: #93c5fd; }
    .nav-item:hover .nav-dot { background: #64748b; }

    .nav-count {
      margin-left: auto;
      font-size: 10px;
      background: #1e293b;
      color: var(--sidebar-text-muted);
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 500;
      min-width: 20px;
      text-align: center;
    }

    .nav-item.active .nav-count {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
    }

    .sidebar-footer .total-count {
      font-size: 11px;
      color: var(--sidebar-text-muted);
    }

    .sidebar-footer .total-count strong {
      color: var(--sidebar-text);
    }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      height: var(--topbar-height);
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 50;
    }

    .topbar-platform {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      min-width: 160px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 8px 36px 8px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.08);
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px;
      display: none;
      line-height: 1;
    }

    .search-clear.visible { display: flex; }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: default;
    }

    /* ─── FILTERS ─── */
    .filters-bar {
      background: #ffffff;
      border-bottom: 1px solid var(--border-light);
      padding: 10px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      flex-shrink: 0;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .filter-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .filter-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .filter-pill[data-type="Error"].active    { background: var(--badge-error-text); border-color: var(--badge-error-text); }
    .filter-pill[data-type="Success"].active  { background: var(--badge-success-text); border-color: var(--badge-success-text); }
    .filter-pill[data-type="Information"].active { background: var(--badge-info-text); border-color: var(--badge-info-text); }
    .filter-pill[data-type="Loading"].active  { background: #475569; border-color: #475569; }
    .filter-pill[data-type="Empty"].active    { background: var(--badge-empty-text); border-color: var(--badge-empty-text); }

    /* ─── STATS ─── */
    .stats-bar {
      background: var(--bg);
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-light);
    }

    .stats-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-right: 4px;
    }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
    }

    .stat-badge.error    { background: var(--badge-error-bg); color: var(--badge-error-text); border-color: var(--badge-error-border); }
    .stat-badge.success  { background: var(--badge-success-bg); color: var(--badge-success-text); border-color: var(--badge-success-border); }
    .stat-badge.info     { background: var(--badge-info-bg); color: var(--badge-info-text); border-color: var(--badge-info-border); }
    .stat-badge.loading  { background: var(--badge-loading-bg); color: var(--badge-loading-text); border-color: var(--badge-loading-border); }
    .stat-badge.empty    { background: var(--badge-empty-bg); color: var(--badge-empty-text); border-color: var(--badge-empty-border); }

    .stat-total {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-left: auto;
    }

    /* ─── CONTENT ─── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-muted);
      gap: 16px;
    }

    .welcome-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #eff6ff, #e0e7ff);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .welcome-screen h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .welcome-screen p {
      font-size: 14px;
      max-width: 360px;
      line-height: 1.7;
    }

    /* ─── SECTION HEADERS ─── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 28px 0 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }

    .section-header:first-child { margin-top: 0; }

    .section-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-light), #e0e7ff);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .subsection-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 18px 0 10px 0;
      padding: 6px 12px;
      background: var(--border-light);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }

    .subsection-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ─── CARDS ─── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      grid-template-rows: auto auto;
      gap: 4px 14px;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border-color: #cbd5e1;
    }

    .card-left {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
      padding-top: 2px;
    }

    .card-center {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
    }

    .card-meta {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .card-actions {
      grid-column: 3;
      grid-row: 1 / 3;
      display: flex;
      align-items: flex-start;
      padding-top: 2px;
    }

    /* Type badge */
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .type-badge.error       { background: var(--badge-error-bg); color: var(--badge-error-text); border-color: var(--badge-error-border); }
    .type-badge.success     { background: var(--badge-success-bg); color: var(--badge-success-text); border-color: var(--badge-success-border); }
    .type-badge.information { background: var(--badge-info-bg); color: var(--badge-info-text); border-color: var(--badge-info-border); }
    .type-badge.loading     { background: var(--badge-loading-bg); color: var(--badge-loading-text); border-color: var(--badge-loading-border); }
    .type-badge.empty       { background: var(--badge-empty-bg); color: var(--badge-empty-text); border-color: var(--badge-empty-border); }

    /* Feedback type badge */
    .fb-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .fb-badge.toast      { background: #f5f3ff; color: var(--feedback-toast); }
    .fb-badge.modal      { background: #f0f9ff; color: var(--feedback-modal); }
    .fb-badge.empty      { background: #ecfdf5; color: var(--feedback-empty); }
    .fb-badge.input      { background: #fef2f2; color: var(--feedback-input); }
    .fb-badge.dialog     { background: #fdf4ff; color: var(--feedback-dialog); }
    .fb-badge.bottomsheet { background: #ecfeff; color: var(--feedback-bottom); }
    .fb-badge.default    { background: var(--border-light); color: var(--feedback-default); }

    /* Message text */
    .message-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .situation-text {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .api-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--badge-error-text);
      background: var(--badge-error-bg);
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--badge-error-border);
    }

    .meta-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--border-light);
      padding: 2px 8px;
      border-radius: 4px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta-tag.action { color: var(--accent); background: var(--accent-light); }

    /* Copy button */
    .copy-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 5px 9px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .copy-btn.copied {
      border-color: var(--badge-success-text);
      color: var(--badge-success-text);
      background: var(--badge-success-bg);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    /* ─── CARD TYPE ACCENT ─── */
    .card[data-type="error"]       { border-left: 3px solid var(--badge-error-text); }
    .card[data-type="success"]     { border-left: 3px solid var(--badge-success-text); }
    .card[data-type="information"] { border-left: 3px solid var(--badge-info-text); }
    .card[data-type="loading"]     { border-left: 3px solid #94a3b8; }
    .card[data-type="empty"]       { border-left: 3px solid var(--badge-empty-text); }

    /* ─── SCROLL TO TOP ─── */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(29,78,216,0.3);
      transition: all 0.2s;
      z-index: 200;
    }

    .scroll-top.visible { display: flex; }
    .scroll-top:hover { background: #1e40af; transform: translateY(-2px); }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .sidebar { width: 200px; min-width: 200px; }
      .card { grid-template-columns: 80px 1fr; }
      .card-actions { grid-column: 2; grid-row: 3; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-badge">
        <div class="logo-icon">W</div>
        <div>
          <h1>UX Writing 가이드</h1>
          <div class="subtitle">WILLOG Internal</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- filled by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="total-count">
        전체 메세지 <strong id="totalCount">0</strong>개
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-platform" id="platformTitle">플랫폼을 선택하세요</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="메세지, 상황으로 검색..." autocomplete="off">
        <button class="search-clear" id="searchClear" title="지우기">✕</button>
      </div>
    </header>

    <div class="filters-bar" id="filtersBar">
      <div class="filter-group">
        <span class="filter-label">타입</span>
        <button class="filter-pill active" data-filter="type" data-type="All">전체</button>
        <button class="filter-pill" data-filter="type" data-type="Error">Error</button>
        <button class="filter-pill" data-filter="type" data-type="Success">Success</button>
        <button class="filter-pill" data-filter="type" data-type="Information">Information</button>
        <button class="filter-pill" data-filter="type" data-type="Loading">Loading</button>

const TYPE_ICONS = {
  error: '⚠', success: '✓', information: 'ℹ', loading: '⏳', empty: '○'
};

const TYPE_LABELS_KO = {
  error: 'Error', success: 'Success', information: 'Info', loading: 'Loading', empty: 'Empty'
};

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentPlatform = null;
let filterType = 'All';
let filterFb   = 'All';
let searchQuery = '';

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  renderSidebar();
  setupSearch();
  setupFilters();
  setupScrollTop();
  updateTotalCount();
}

function updateTotalCount() {
  let total = 0;
  for (const key in DATA) {
    total += DATA[key].filter(e => e.kind === 'item').length;
  }
  document.getElementById('totalCount').textContent = total.toLocaleString();
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';

  for (const group of PLATFORM_GROUPS) {
    html += `<div class="nav-group"><div class="nav-group-label">${group.label}</div>`;
    for (const item of group.items) {
      const sheetData = DATA[item.key] || [];
      const count = sheetData.filter(e => e.kind === 'item').length;
      html += `
        <div class="nav-item" data-key="${escapeAttr(item.key)}" onclick="selectPlatform('${escapeAttr(item.key)}', '${escapeAttr(item.label)}')">
          <span class="nav-dot"></span>
          <span>${item.label}</span>
          <span class="nav-count">${count}</span>
        </div>`;
    }
    html += `</div>`;
  }

  nav.innerHTML = html;
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ─── SELECT PLATFORM ─────────────────────────────────────────────────────────
function selectPlatform(key, label) {
  currentPlatform = key;
  searchQuery = '';
  filterType = 'All';
  filterFb = 'All';

  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.querySelectorAll('.filter-pill[data-filter="type"]').forEach(p => {
    p.classList.toggle('active', p.dataset.type === 'All');
  });
  document.querySelectorAll('.filter-pill[data-filter="fb"]').forEach(p => {
    p.classList.toggle('active', p.dataset.type === 'All');
  });

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });

  document.getElementById('platformTitle').textContent = label;
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('welcomeScreen') && (document.getElementById('welcomeScreen').style.display = 'none');

  renderContent();
}

// ─── RENDER CONTENT ──────────────────────────────────────────────────────────
function renderContent() {
  if (!currentPlatform) return;

  const sheetData = DATA[currentPlatform] || [];
  const area = document.getElementById('contentArea');

  const q = searchQuery.toLowerCase().trim();
  const stats = { error: 0, success: 0, information: 0, loading: 0, empty: 0 };
  let renderedItems = 0;

  let html = '<div class="cards-grid">';
  let pendingSections = [];

  for (const entry of sheetData) {
    if (entry.kind === 'section') {
      pendingSections = [{ kind: 'section', title: entry.title }];
      continue;
    }
    if (entry.kind === 'subsection') {
      // Remove any existing subsection, add this one
      pendingSections = pendingSections.filter(s => s.kind !== 'subsection');
      pendingSections.push({ kind: 'subsection', title: entry.title });
      continue;
    }
    if (entry.kind !== 'item') continue;

    const d = entry.data;
    const typeKey = d.type.toLowerCase();

    // Apply filters
    if (filterType !== 'All' && d.type.toLowerCase() !== filterType.toLowerCase()) continue;
    if (filterFb !== 'All') {
      const fbLower = (d.feedback_type || '').toLowerCase().trim();
      const filterLower = filterFb.toLowerCase();
      if (fbLower !== filterLower) continue;
    }
    if (q) {
      const haystack = (d.message + ' ' + d.situation + ' ' + d.notes + ' ' + d.action).toLowerCase();
      if (!haystack.includes(q)) continue;
    }

    // Flush pending section headers
    for (const ps of pendingSections) {
      if (ps.kind === 'section') {
        html += renderSectionHeader(ps.title);
      } else {
        html += renderSubsectionHeader(ps.title);
      }
    }
    pendingSections = [];

    stats[typeKey] = (stats[typeKey] || 0) + 1;
    renderedItems++;
    html += renderCard(d);
  }

  if (renderedItems === 0) {
    html += `<div class="empty-state">
      <div class="icon">🔍</div>
      <h3>결과 없음</h3>
      <p>검색어 또는 필터 조건에 맞는 메세지가 없습니다.</p>
    </div>`;
  }

  html += '</div>';
  area.innerHTML = html;

  updateStats(stats, renderedItems);
}

function renderSectionHeader(title) {
  return `<div class="section-header">
    <div class="section-icon">📂</div>
    <span class="section-title">${escapeHtml(title)}</span>
  </div>`;
}

function renderSubsectionHeader(title) {
  return `<div class="subsection-header">
    <span class="subsection-title">${escapeHtml(title)}</span>
  </div>`;
}

function renderCard(d) {
  const typeKey = d.type.toLowerCase();
  const fbKey = getFbKey(d.feedback_type);

  const msgHtml = d.message
    ? `<div class="message-text">${escapeHtml(d.message)}</div>`
    : `<div class="message-text" style="color:var(--text-muted);font-style:italic;font-weight:400">(메세지 없음)</div>`;

  const situHtml = d.situation
    ? `<div class="situation-text">${escapeHtml(d.situation)}</div>`
    : '';

  const apiHtml = d.api_code
    ? `<span class="api-code">${escapeHtml(d.api_code)}</span>`
    : '';

  const actionHtml = d.action
    ? `<span class="meta-tag action" title="대응방법">▶ ${escapeHtml(d.action)}</span>`
    : '';

  const notesHtml = d.notes
    ? `<span class="meta-tag" title="비고">💬 ${escapeHtml(d.notes.substring(0, 60))}${d.notes.length > 60 ? '…' : ''}</span>`
    : '';

  const fbHtml = d.feedback_type
    ? `<span class="fb-badge ${fbKey}">${escapeHtml(d.feedback_type)}</span>`
    : '';

  const copyMsg = d.message ? d.message.replace(/\n/g, '\\n') : '';

  return `
    <div class="card" data-type="${typeKey}">
      <div class="card-left">
        <span class="type-badge ${typeKey}">${TYPE_ICONS[typeKey] || ''} ${escapeHtml(d.type)}</span>
        ${fbHtml}
        ${apiHtml}
      </div>
      <div class="card-center">
        ${msgHtml}
        ${situHtml}
      </div>
      <div class="card-meta">
        ${actionHtml}
        ${notesHtml}
      </div>
      <div class="card-actions">
        <button class="copy-btn" onclick="copyMessage(this, '${escapeAttr(copyMsg.replace(/'/g, "\\'"))}')" title="메세지 복사">
          📋 복사
        </button>
      </div>
    </div>`;
}

function getFbKey(fb) {
  if (!fb) return 'default';
  const f = fb.toLowerCase().trim();
  if (f === 'toast') return 'toast';
  if (f === 'modal') return 'modal';
  if (f === 'empty') return 'empty';
  if (f.startsWith('input')) return 'input';
  if (f.startsWith('dialog')) return 'dialog';
  if (f.startsWith('bottomsheet')) return 'bottomsheet';
  return 'default';
}

function updateStats(stats, total) {
  document.getElementById('statError').textContent   = `⚠ Error ${stats.error || 0}`;
  document.getElementById('statSuccess').textContent = `✓ Success ${stats.success || 0}`;
  document.getElementById('statInfo').textContent    = `ℹ Info ${stats.information || 0}`;
  document.getElementById('statLoading').textContent = `⏳ Loading ${stats.loading || 0}`;
  document.getElementById('statEmpty').textContent   = `○ Empty ${stats.empty || 0}`;
  document.getElementById('statTotal').textContent   = `총 ${total}개`;
}

// ─── COPY ────────────────────────────────────────────────────────────────────
function copyMessage(btn, text) {
  const decoded = text.replace(/\\n/g, '\n');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 복사';
      btn.classList.remove('copied');
    }, 1800);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = decoded;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 복사';
      btn.classList.remove('copied');
    }, 1800);
  });
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  let timer;

  input.addEventListener('input', () => {
    searchQuery = input.value;
    clear.classList.toggle('visible', !!searchQuery);
    clearTimeout(timer);
    timer = setTimeout(() => { if (currentPlatform) renderContent(); }, 200);
  });

  clear.addEventListener('click', () => {
    input.value = '';
    searchQuery = '';
    clear.classList.remove('visible');
    if (currentPlatform) renderContent();
    input.focus();
  });
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function setupFilters() {
  document.querySelectorAll('.filter-pill[data-filter="type"]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill[data-filter="type"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterType = btn.dataset.type;
      if (currentPlatform) renderContent();
    });
  });

  document.querySelectorAll('.filter-pill[data-filter="fb"]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill[data-filter="fb"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterFb = btn.dataset.type;
      if (currentPlatform) renderContent();
    });
  });
}

// ─── SCROLL TOP ──────────────────────────────────────────────────────────────
function setupScrollTop() {
  const btn = document.getElementById('scrollTop');
  const content = document.getElementById('contentArea');

  content.addEventListener('scroll', () => {
    btn.classList.toggle('visible', content.scrollTop > 300);
  });

  btn.addEventListener('click', () => {
    content.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
